name: Deploy Staging

on:
  push:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: staging

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      # - name: Run Tests
      #   run: echo "No tests yet - skipping"

      - name: Build Application
        run: npm run build

      - name: Trigger Render Staging Deployment
        run: |
          curl --fail --silent --show-error \
          -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"
