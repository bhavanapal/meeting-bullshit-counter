version: "3.9"

services:
   mongodb:
     image: mongo:8
     container_name: meeting-mongo-db
     restart: unless-stopped

     ports:
       - "27017:27017"
     
     volumes:
       -mongo_data:/data/db

     environment:
      MONGO_INITDB_DATABASE: meetingcounter

   api:
     build: 
     context: .
     dockerfile: Dockerfile
     container_name: meeting-api
     ports:
      - "8000:8000"
     env_file:
      - .env

     depends_on:
      - mongodb
    
     restart: unless-stopped

   volumes:
      mongo_data: